name: fugrade_automation
description: Automates .cmt file creation for FU Grading Editor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Google Sheets API v4 + service account auth
  googleapis: ^14.0.0
  googleapis_auth: ^1.6.0

  # File/folder pickers
  file_picker: ^5.5.0

  # Desktop window management
  window_manager: ^0.4.3

  # Local storage
  path: ^1.9.1

  # JSON serialization
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/helper/
    - assets/helper/MasterFile/
